services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/memory/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://memory:memory@db:5432/memory
      ALEM_API_KEY: ${ALEM_API_KEY:-}
      ALEM_LLM_BASE_URL: ${ALEM_LLM_BASE_URL:-https://llm.alem.ai/v1}
      ALEM_LLM_MODEL: ${ALEM_LLM_MODEL:-alemllm}
      EMBED_API_KEY: ${EMBED_API_KEY:-}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-https://llm.alem.ai/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-1024}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://llm.alem.ai/v1}
      RERANK_MODEL: ${RERANK_MODEL:-reranker}
      MEMORY_AUTH_TOKEN: ${MEMORY_AUTH_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

volumes:
  pgdata:
    driver: local
